name: Build & Push Docker Image

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]

            jobs:
              build:
                  runs-on: ubuntu-latest

                      steps:
                            - name: Checkout code
                                    uses: actions/checkout@v4

                                          - name: Set up Docker Buildx
                                                  uses: docker/setup-buildx-action@v3

                                                        - name: Build Docker image
                                                                run: |
                                                                          docker build -t personal-ops-assistant:latest .

                                                                                - name: Test import (smoke test)
                                                                                        run: |
                                                                                                  docker run --rm personal-ops-assistant:latest python -c "
                                                                                                            import config
                                                                                                                      import calendar_service
                                                                                                                                import twilio_service
                                                                                                                                          import claude_agent
                                                                                                                                                    import grok_agent
                                                                                                                                                              import scheduler
                                                                                                                                                                        print('All modules imported successfully')
                                                                                                                                                                                  "
